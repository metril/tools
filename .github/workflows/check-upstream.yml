name: check-upstream

# Daily check for newer Vault / base-image versions. A newer upstream is only
# adopted once it has been public for the vetting delay (default 7 days). When a
# version clears the gate, open an auto-merge PR bumping versions.json — merging
# it triggers the release workflow, which cuts a semver release and image.

on:
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC
  workflow_dispatch:
    inputs:
      delay_days:
        description: "Override vetting delay in days"
        required: false
        default: "7"

permissions:
  contents: write # push the bump branch
  pull-requests: write # open the PR

concurrency:
  group: check-upstream
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Authenticates the branch push. With AUTOMATION_TOKEN set, the PR is
          # attributed to the PAT so its build-test check runs and auto-merge works.
          token: ${{ secrets.AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Evaluate upstreams against the vetting gate
        id: gate
        env:
          DELAY_DAYS: ${{ github.event.inputs.delay_days || '7' }}
        run: bash scripts/check-upstream.sh

      - name: Open / update PR (native git + gh)
        if: steps.gate.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: chore/upstream-bump
          DELAY_DAYS: ${{ github.event.inputs.delay_days || '7' }}
          SUBJECT: ${{ steps.gate.outputs.commit_subject }}
          # Body passed via env (not ${{ }} inlining) to avoid quoting/injection issues.
          BODY: ${{ steps.gate.outputs.body }}
        run: |
          set -euo pipefail
          git config user.name metril
          git config user.email 1517921+metril@users.noreply.github.com
          git checkout -B "$BRANCH"
          git add versions.json
          git commit -m "$SUBJECT" -m "$BODY"
          git push -f origin "$BRANCH"
          pr_body="Automated upstream bump — cleared the ${DELAY_DAYS:-7}-day vetting delay.

          $BODY"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            gh pr create --base main --head "$BRANCH" --title "$SUBJECT" --body "$pr_body"
          fi
          gh pr merge --squash --auto "$BRANCH" \
            || echo "auto-merge not enabled (needs AUTOMATION_TOKEN + branch protection); merge the PR manually"

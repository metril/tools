name: scheduled-rebuild

# Periodic safety rebuild. Even when Vault and the base-image digest are unchanged,
# this cuts a weekly patch release so the unpinned Alpine packages (jq/curl/wget and
# transitive libs) are refreshed with the latest distro security fixes.
#
# Implemented as a sentinel-file PR (not a direct push) so it flows through the same
# branch-protection + auto-merge path as every other change. Tradeoff: produces a
# patch release roughly weekly even with no upstream change — intended for freshness.

on:
  schedule:
    - cron: "30 5 * * 1" # Mondays 05:30 UTC
  workflow_dispatch:

permissions:
  contents: write # push the rebuild branch
  pull-requests: write # open the PR

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Authenticates the branch push; PAT (if set) makes the PR's build-test run.
          token: ${{ secrets.AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Stamp rebuild marker
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .rebuild-stamp

      - name: Open / update PR (native git + gh)
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: chore/scheduled-rebuild
          SUBJECT: "fix: scheduled rebuild to refresh distro packages"
        run: |
          set -euo pipefail
          git config user.name metril
          git config user.email 1517921+metril@users.noreply.github.com
          git checkout -B "$BRANCH"
          git add .rebuild-stamp
          git commit -m "$SUBJECT"
          git push -f origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')" ]; then
            gh pr create --base main --head "$BRANCH" --title "$SUBJECT" \
              --body "Automated weekly rebuild — refreshes unpinned Alpine packages (jq/curl/wget + transitive libraries) with the latest distro fixes."
          fi
          gh pr merge --squash --auto "$BRANCH" \
            || echo "auto-merge not enabled (needs AUTOMATION_TOKEN + branch protection); merge the PR manually"
